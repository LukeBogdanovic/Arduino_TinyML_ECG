<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNO Q ECG Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <script src="/libs/socket.io.min.js"></script>
    <script src="/app.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <h1 class="header-title">UNO<span>Q</span> ECG</h1>
        <span class="badge">AD8232</span>
        <span class="badge">200 Hz · 12-bit</span>
        <span class="conn-badge">
            <span class="conn-dot" id="connDot"></span>
            <span id="connText">DISCONNECTED</span>
        </span>
    </header>

    <div class="controls">
        <button class="btn" id="ecgToggleBtn" onclick="toggleECG()">Turn ECG On</button>
        <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="ecgStateText">ECG is OFF</span>
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">Heart Rate</div>
            <div class="stat-value green" id="hrVal">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Peak Freq</div>
            <div class="stat-value blue" id="peakFreqVal">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Samples</div>
            <div class="stat-value" id="sampleCountVal">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">SNR (est)</div>
            <div class="stat-value warn" id="snrVal">—</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <div>
                <span class="panel-title">Raw ECG</span>
            </div>
            <span class="panel-meta" id="rawStatus">Awaiting signal…</span>
        </div>
        <canvas id="rawCanvas"></canvas>
    </div>

    <div class="panel">
        <div class="panel-header">
            <div>
                <span class="panel-title">Filtered ECG</span>
                <span class="panel-subtitle">Butterworth 4th-order BP</span>
            </div>
            <span class="panel-meta" id="filteredStatus">Awaiting signal…</span>
        </div>
        <canvas id="filteredCanvas"></canvas>
    </div>

    <div class="panel">
        <div class="panel-header">
            <div>
                <span class="panel-title">FFT Magnitude</span>
            </div>
            <span class="panel-meta" id="fftStatus">Awaiting signal…</span>
        </div>
        <canvas id="fftCanvas"></canvas>
    </div>

</body>

</html>
